<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приемка машины</title>
<style>
body { font-family: Arial; padding: 20px; }
label { margin-top: 10px; display: block; }
input, textarea { width: 100%; padding: 10px; margin-top: 5px; }
button { width: 100%; padding: 15px; margin-top: 15px; }
table { width: 100%; margin-top:20px; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 8px; }
</style>
</head>
<body>

<h2>Начало приемки</h2>
<label>ТН машины:</label><input id="tn">

<label>Начальный № паллеты:</label><input id="startNo">

<label>Номер заказа:</label><input id="order">

<label>Наименование:</label><input id="name">

<label>Кол-во:</label><input id="qty">

<label>Брак:</label><textarea id="defect"></textarea>

<button onclick="addPallet()">Добавить паллет</button>
<button onclick="finishReception()">Завершить приемку</button>

<h3>Текущие паллеты</h3>
<table id="table">
<tr><th>#</th><th>Заказ</th><th>Наименование</th><th>Кол‑во</th><th>Брак</th></tr>
</table>

<script>
let pallets = [];
let autoNo = 0;

function addPallet() {
  const tn = document.getElementById("tn").value.trim();
  const order = document.getElementById("order").value.trim();
  const name = document.getElementById("name").value.trim();
  const qty = document.getElementById("qty").value.trim();
  const defect = document.getElementById("defect").value.trim();

  if (!tn  !order  !name || !qty) return;

  if (!autoNo) {
    autoNo = Number(document.getElementById("startNo").value) || 1;
  }

  pallets.push({ order, name, quantity: qty, defect, palletNo: autoNo });
  autoNo++;

  updateTable();

  document.getElementById("order").value = "";
  document.getElementById("name").value = "";
  document.getElementById("qty").value = "";
  document.getElementById("defect").value = "";
}

function updateTable() {
  const t = document.getElementById("table");
  t.innerHTML = "<tr><th>#</th><th>Заказ</th><th>Наименование</th><th>Кол‑во</th><th>Брак</th></tr>";
  pallets.forEach(p => {
    const row = t.insertRow();
    row.insertCell(0).innerText = p.palletNo;
    row.insertCell(1).innerText = p.order;
    row.insertCell(2).innerText = p.name;
    row.insertCell(3).innerText = p.quantity;
    row.insertCell(4).innerText = p.defect;
  });
}

function finishReception() {
  if(!pallets.length) return;
  const tn = document.getElementById("tn").value;
  const payload = { TN: tn, pallets, timestamp: new Date().toISOString() };

  fetch("URL_AppsScript", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(() => {
    pallets = [];
    updateTable();
    document.getElementById("tn").value = "";
    document.getElementById("startNo").value = "";
  });
}
</script>

</body>
</html>
