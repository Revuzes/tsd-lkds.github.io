<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Приёмка паллет</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; padding: 10px; font-size: 18px; }
input, select { font-size: 18px; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
button { font-size: 20px; padding: 15px; margin: 10px 0; width: 100%; background-color: #007BFF; color: white; border: none; border-radius: 5px; }
table { width: 100%; font-size: 16px; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
label { font-weight: bold; }
span.prefix { font-weight: bold; }
</style>
</head>
<body>

<h2>Приёмка паллет</h2>

<div>
<label>ТН машины:</label>
<input type="text" id="tnMachine" placeholder="Введите ТН">
</div>

<div>
<label>Номер заказа:</label>
<span class="prefix">01-</span>
<input type="text" id="orderNumber" placeholder="000000" maxlength="6">
</div>

<div>
<label>Партия:</label>
<span class="prefix">1000000</span>
<input type="text" id="batchNumber" placeholder="000" maxlength="3">
</div>

<div>
<label>Дата партии 1:</label>
<input type="text" id="batchDate1" placeholder="__.__.____">
</div>

<div>
<label>Дата партии 2 (необязательно):</label>
<input type="text" id="batchDate2" placeholder="__.__.____">
</div>

<div>
<label>Наименование товара:</label>
<input type="text" id="productName">
</div>

<div>
<label>Кол-во по документам/Вес:</label>
<input type="text" id="docQty">
</div>

<div>
<label>Ед. измерения:</label>
<input type="text" id="unit">
</div>

<div>
<label>Кол-во на поддоне:</label>
<input type="text" id="palletQty">
</div>

<div>
<label>Тип упаковки:</label>
<select id="packageType">
<option value="Коробки">Коробки</option>
<option value="Бочки">Бочки</option>
<option value="Шт.">Шт.</option>
<option value="Банки">Банки</option>
<option value="Другое">Другое</option>
</select>
<input type="text" id="otherPackage" placeholder="Указать тип" style="display:none;">
</div>

<div>
<label>Место:</label>
<input type="text" id="place">
</div>

<div>
<label>Номер паллета: EUR-00000</label>
<input type="text" id="palletNumber" placeholder="0000" maxlength="4">
</div>

<div>
<label>Наличие брака:</label>
<input type="text" id="defect">
</div>

<button id="addPallet">Завершить паллет</button>

<h3>Текущие паллеты</h3>
<table id="palletTable">
<thead>
<tr>
<th>Номер заказа</th>
<th>Партия + даты</th>
<th>Наименование товара</th>
<th>Кол-во по документам/Вес</th>
<th>Ед. измерения</th>
<th>Кол-во на поддоне</th>
<th>Тип упаковки</th>
<th>Место</th>
<th>Номер паллета</th>
<th>Наличие брака</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="finishReception">Завершить приёмку</button>

<script>
const palletTableBody = document.querySelector("#palletTable tbody");
const packageType = document.getElementById("packageType");
const otherPackage = document.getElementById("otherPackage");

packageType.addEventListener("change", () => {
otherPackage.style.display = packageType.value === "Другое" ? "inline-block" : "none";
});

// Форматирование даты
function formatDateInput(input) {
let v = input.value.replace(/\D/g, '');
if (v.length >= 2) v = v.slice(0,2)+'.'+v.slice(2);
if (v.length >= 5) v = v.slice(0,5)+'.'+v.slice(5);
if (v.length > 10) v = v.slice(0,10);
input.value = v;
}

document.getElementById("batchDate1").addEventListener("input", e=>formatDateInput(e.target));
document.getElementById("batchDate2").addEventListener("input", e=>formatDateInput(e.target));

document.getElementById("addPallet").addEventListener("click", () => {
const tnMachine = document.getElementById("tnMachine").value;
const fullOrder = "01-" + document.getElementById("orderNumber").value;
const fullBatch = "1000000" + document.getElementById("batchNumber").value;
const batchDate1 = document.getElementById("batchDate1").value;
const batchDate2 = document.getElementById("batchDate2").value;
const productName = document.getElementById("productName").value;
const docQty = document.getElementById("docQty").value;
const unit = document.getElementById("unit").value;
const palletQty = document.getElementById("palletQty").value;
const type = packageType.value === "Другое" ? otherPackage.value : packageType.value;
const place = document.getElementById("place").value;
const palletNumber = "EUR-00000" + document.getElementById("palletNumber").value;
const defect = document.getElementById("defect").value;

const batchCell = fullBatch + "\n" +
(batchDate1 ? "(" + batchDate1 + (batchDate2 ? ", " + batchDate2 : "") + ")" : "");

const row = document.createElement("tr");
[fullOrder, batchCell, productName, docQty, unit, palletQty, type, place, palletNumber, defect]
.forEach(text => {
const td = document.createElement("td");
td.innerText = text;
row.appendChild(td);
});

palletTableBody.appendChild(row);

// Очистка полей кроме ТН машины и номер паллеты (увеличение на 1)
document.getElementById("orderNumber").value = "";
document.getElementById("batchNumber").value = "";
document.getElementById("batchDate1").value = "";
document.getElementById("batchDate2").value = "";
document.getElementById("productName").value = "";
document.getElementById("docQty").value = "";
document.getElementById("unit").value = "";
document.getElementById("palletQty").value = "";
document.getElementById("packageType").value = "Коробки";
otherPackage.style.display = "none";
otherPackage.value = "";
document.getElementById("place").value = "";
document.getElementById("palletNumber").value = (parseInt(document.getElementById("palletNumber").value) + 1).toString().padStart(4, "0");
document.getElementById("defect").value = "";
});

document.getElementById("finishReception").addEventListener("click", () => {
const rows = Array.from(palletTableBody.querySelectorAll("tr")).map(tr =>
Array.from(tr.children).map(td => td.innerText)
);

if (rows.length === 0) {
alert("Нет данных для отправки!");
return;
}

fetch("https://script.google.com/macros/s/AKfycbynWyiUysvvsPm1Lg9JVnbgCf5DkwZaniH3vmbEMA83djnIlhm5DIXsa13bjw3tLQW0Sw/exec", { // Заменить на URL Apps Script
method: "POST",
body: JSON.stringify({rows}),
headers: {"Content-Type":"application/json"}
})
.then(res => res.json())
.then(data => {
if (data.status === "ok") {
alert("Данные успешно отправлены");
// очистка всех полей
document.getElementById("tnMachine").value = "";
document.getElementById("palletNumber").value = "0000";
palletTableBody.innerHTML = "";
} else {
alert("Ошибка отправки");
}
});
});
</script>

</body>
</html>
